# Configuración de Despliegue en Netlify: SE-Extract AI

[build]
  # Carpeta que contiene los archivos públicos estáticos (HTML/CSS/JS)
  publish = "."

  # Carpeta que contiene las funciones serverless de backend
  functions = "netlify/functions"

[functions.extract]
  # Tiempo de espera extendido a 90 segundos para la extracción con IA
  timeout = 90

# Reglas de redirección básicas para SPA o APIs si fueran necesarias
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
